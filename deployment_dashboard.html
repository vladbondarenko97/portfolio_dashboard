<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$1M Deployment Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #141414;
            --border-subtle: #2a2a2a;
            --text-primary: #f5f5f5;
            --text-secondary: #8a8a8a;
            --accent-muted: #3a3a3a;
            --font-main: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin: 0;
            text-transform: uppercase;
        }

        .timestamp {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 24px;
        }

        /* Top Left: Liquidity */
        .module-liquidity {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        /* Top Right: Scanner Output */
        .module-scanner {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        /* Bottom: EV Tracker */
        .module-ev {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 24px;
        }

        .panel-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .data-block {
            margin-bottom: 20px;
        }
        
        .data-block:last-child {
            margin-bottom: 0;
        }

        .data-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .data-value.sub {
            font-size: 20px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .row-title {
            font-size: 14px;
            font-weight: 500;
        }

        .row-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .row-metric {
            text-align: right;
            font-family: monospace;
            font-size: 14px;
        }

        .metric-pill {
            background-color: var(--accent-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }

        /* Stoic Indicators */
        .status-positive {
            color: #b0c4de; /* Muted steel blue instead of bright green */
        }
        .status-negative {
            color: #d8a0a0; /* Muted rose instead of bright red */
        }
        
        /* Flex containers for side-by-side metrics */
        .metric-group {
            display: flex;
            gap: 40px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Command Center / Deployment</h1>
        <div class="timestamp" id="last-updated">SYS.UPDATED: --</div>
    </div>

    <div class="dashboard-grid">
        
        <!-- Module 1: Total Liquidity & Risk -->
        <div class="panel module-liquidity">
            <div class="panel-header">I. Capital Allocation</div>
            
            <div class="data-block">
                <div class="data-label">Bucket A (Base Layer)</div>
                <div class="data-value" id="bucket-a">$0.00</div>
            </div>
            
            <div class="metric-group">
                <div class="data-block">
                    <div class="data-label">Bucket B (Velocity)</div>
                    <div class="data-value sub" id="bucket-b">$0.00</div>
                </div>
                <div class="data-block">
                    <div class="data-label">Active Capital at Risk</div>
                    <div class="data-value sub" id="capital-risk">$0.00</div>
                </div>
            </div>

            <div class="data-block" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-subtle);">
                <div class="data-label">VMRI Apex Score</div>
                <div class="data-value sub" id="vmri-score" style="font-family: monospace;">---</div>
            </div>
        </div>

        <!-- Module 2: The Scanner Output -->
        <div class="panel module-scanner">
            <div class="panel-header">II. The Scanner Output (Top 3 Edge Setups)</div>
            <div id="scanner-list">
                <!-- Injected via JS -->
                <div class="data-row">
                    <span class="row-title" style="color: var(--text-secondary);">Awaiting payload...</span>
                </div>
            </div>
        </div>

        <!-- Module 3: Active Trades vs EV -->
        <div class="panel module-ev">
            <div class="panel-header">III. Active Deployments vs. Expected Value</div>
            <div id="ev-list">
                <!-- Injected via JS -->
                <div class="data-row">
                    <span class="row-title" style="color: var(--text-secondary);">Awaiting payload...</span>
                </div>
            </div>
        </div>

    </div>

        <!-- Payload loaded as JS variable for local file:// compatibility -->
        <script src="deployment_payload.js"></script>
        
        <script>
        // Formatting helper
        const formatCurrency = (num) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            }).format(num);
        };

        async function loadDashboard() {
            try {
                // Read from the globally injected variable provided by deployment_payload.js
                if (typeof DASHBOARD_PAYLOAD === 'undefined') {
                    throw new Error("DASHBOARD_PAYLOAD is not defined. Ensure deployment_engine.py has run.");
                }
                
                const data = DASHBOARD_PAYLOAD;
                
                // Update Header
                document.getElementById('last-updated').textContent = `SYS.UPDATED: ${data.last_updated}`;
                
                // Update Module 1: Liquidity
                document.getElementById('bucket-a').textContent = formatCurrency(data.liquidity.bucket_A_total);
                document.getElementById('bucket-b').textContent = formatCurrency(data.liquidity.bucket_B_total);
                document.getElementById('capital-risk').textContent = formatCurrency(data.liquidity.capital_at_risk);
                document.getElementById('vmri-score').textContent = data.vmri;

                // Update Module 2: Scanner
                const scannerList = document.getElementById('scanner-list');
                scannerList.innerHTML = ''; // clear
                if (data.scanner_output.length === 0) {
                    scannerList.innerHTML = `<div class="data-row"><span class="row-desc">No high-edge setups flagged today.</span></div>`;
                } else {
                    data.scanner_output.forEach((setup, index) => {
                        scannerList.innerHTML += `
                            <div class="data-row">
                                <div>
                                    <div class="row-title">${index + 1}. ${setup.asset} <span class="metric-pill">${setup.type}</span></div>
                                    <div class="row-desc">${setup.description}</div>
                                </div>
                                <div class="row-metric">
                                    Size: ${setup.suggested_allocation_pct}%<br>
                                    <span style="color: var(--text-secondary);">${formatCurrency(setup.suggested_capital)}</span>
                                </div>
                            </div>
                        `;
                    });
                }

                // Update Module 3: EV
                const evList = document.getElementById('ev-list');
                evList.innerHTML = ''; // clear
                if (data.active_trades_ev.length === 0) {
                    evList.innerHTML = `<div class="data-row"><span class="row-desc">No active deployments.</span></div>`;
                } else {
                    data.active_trades_ev.forEach(trade => {
                        const statusClass = trade.status.includes('Positive') ? 'status-positive' : 'status-negative';
                        evList.innerHTML += `
                            <div class="data-row">
                                <div class="row-title">${trade.trade}</div>
                                <div class="row-metric">
                                    <span class="${statusClass}">${trade.status}</span>
                                    <span class="metric-pill ${statusClass}">${trade.current_ev}</span>
                                </div>
                            </div>
                        `;
                    });
                }

            } catch (error) {
                console.error("Failed to load payload:", error);
                document.getElementById('last-updated').textContent = "SYS.ERROR: UNABLE TO READ PAYLOAD (CHECK LOCAL SERVER)";
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadDashboard);
        
        // Auto-refresh every 60 seconds
        setInterval(loadDashboard, 60000);
    </script>
</body>
</html>
